<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlareDesk — Support Triage Command Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0f1e;
      --panel: #111827;
      --border: #1e293b;
      --teal: #00d4aa;
      --red: #ff4757;
      --amber: #ffa502;
      --muted: #8892a4;
      --text: #e2e8f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      opacity: 0;
      animation: fadeIn 0.6s ease forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.55} }
    .app { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }
    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .logo { font-size: 1.25rem; font-weight: 600; color: var(--teal); letter-spacing: 0.04em; }
    .logo span { color: var(--muted); font-weight: 400; font-size: 0.75rem; display: block; }
    .filter-group label { display: block; font-size: 0.7rem; text-transform: uppercase; color: var(--muted); margin-bottom: 0.35rem; }
    .filter-group select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem;
      border-radius: 6px;
      font-family: inherit;
    }
    .mini-stats { display: grid; gap: 0.75rem; }
    .mini-stat {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem;
    }
    .mini-stat .val {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.4rem;
      color: var(--teal);
    }
    .mini-stat .lbl { font-size: 0.7rem; color: var(--muted); margin-top: 0.25rem; }
    .main { display: flex; flex-direction: column; overflow: hidden; }
    .topbar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, #0d1528 0%, var(--bg) 100%);
    }
    .stat-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.25rem;
    }
    .stat-card .num {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.75rem;
      font-weight: 600;
    }
    .stat-card .label { color: var(--muted); font-size: 0.8rem; margin-top: 0.25rem; }
    .content { flex: 1; padding: 1.25rem 1.5rem; overflow: auto; position: relative; }
    .submit-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 1rem;
      overflow: hidden;
    }
    .submit-toggle {
      width: 100%;
      text-align: left;
      padding: 0.85rem 1rem;
      background: transparent;
      border: none;
      color: var(--teal);
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .submit-form { display: none; padding: 0 1rem 1rem; gap: 0.75rem; flex-direction: column; }
    .submit-form.open { display: flex; }
    .submit-form input, .submit-form textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.6rem;
      border-radius: 6px;
      font-family: inherit;
    }
    .submit-form textarea { min-height: 100px; resize: vertical; }
    .btn {
      background: var(--teal);
      color: #041018;
      border: none;
      padding: 0.65rem 1.2rem;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--text); }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th {
      text-align: left;
      color: var(--muted);
      font-size: 0.65rem;
      text-transform: uppercase;
      padding: 0.65rem;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }
    td { padding: 0.65rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr { cursor: pointer; transition: background 0.15s; }
    tr:hover { background: rgba(0,212,170,0.06); }
    tr.highlight { animation: rowFlash 1.5s ease; }
    @keyframes rowFlash {
      0% { background: rgba(0,212,170,0.35); }
      100% { background: transparent; }
    }
    .badge {
      display: inline-block;
      padding: 0.2rem 0.5rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .tone-Furious { background: rgba(255,71,87,0.2); color: var(--red); }
    .tone-Frustrated { background: rgba(255,165,2,0.2); color: var(--amber); }
    .tone-Anxious { background: rgba(255,165,2,0.15); color: #f1c40f; }
    .tone-Neutral { background: rgba(136,146,164,0.2); color: var(--muted); }
    .tone-Satisfied { background: rgba(0,212,170,0.2); color: var(--teal); }
    .prio-CRITICAL { background: rgba(255,71,87,0.25); color: var(--red); animation: pulse 1.2s infinite; }
    .prio-HIGH { background: rgba(255,165,2,0.2); color: var(--amber); }
    .prio-MEDIUM { background: rgba(255,165,2,0.12); color: #f1c40f; }
    .prio-LOW { background: rgba(136,146,164,0.2); color: var(--muted); }
    .score-bar {
      width: 80px;
      height: 8px;
      border-radius: 4px;
      background: #1e293b;
      overflow: hidden;
      position: relative;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 4px;
      box-shadow: 0 0 8px currentColor;
    }
    .detail-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: min(420px, 100vw);
      height: 100vh;
      background: var(--panel);
      border-left: 1px solid var(--border);
      transform: translateX(100%);
      transition: transform 0.3s ease;
      z-index: 100;
      padding: 1.5rem;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .detail-panel.open { transform: translateX(0); }
    .detail-panel h2 { font-size: 1rem; color: var(--teal); }
    .detail-meta { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: var(--muted); }
    .detail-body {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      font-size: 0.85rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .detail-actions { display: flex; flex-direction: column; gap: 0.5rem; margin-top: auto; }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.35rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 99;
    }
    .overlay.show { opacity: 1; pointer-events: auto; }
    .empty { text-align: center; color: var(--muted); padding: 2rem; }
  </style>
</head>
<body>
  <div class="overlay" id="overlay"></div>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">FLAREDESK<span>Distress triage ops</span></div>
      <div class="filter-group">
        <label>Status</label>
        <select id="filterStatus"><option value="">All</option><option>Open</option><option>In Progress</option><option>Resolved</option></select>
      </div>
      <div class="filter-group">
        <label>Priority</label>
        <select id="filterPriority"><option value="">All</option><option>CRITICAL</option><option>HIGH</option><option>MEDIUM</option><option>LOW</option></select>
      </div>
      <div class="filter-group">
        <label>Tone</label>
        <select id="filterTone"><option value="">All</option><option>Furious</option><option>Frustrated</option><option>Anxious</option><option>Neutral</option><option>Satisfied</option></select>
      </div>
      <div class="mini-stats" id="miniStats"></div>
    </aside>
    <div class="main">
      <div class="topbar" id="topbar"></div>
      <div class="content">
        <div class="submit-panel">
          <button type="button" class="submit-toggle" id="submitToggle">+ Submit incoming email for analysis</button>
          <form class="submit-form" id="submitForm">
            <input type="email" id="sender" placeholder="Sender email" required />
            <input type="text" id="subject" placeholder="Subject" required />
            <textarea id="body" placeholder="Email body..." required></textarea>
            <button type="submit" class="btn" id="submitBtn">Analyze with AI</button>
          </form>
        </div>
        <table>
          <thead>
            <tr>
              <th data-sort="distress_score">Distress</th>
              <th data-sort="priority">Priority</th>
              <th>Sender</th>
              <th>Subject</th>
              <th>Tone</th>
              <th>Risk</th>
              <th data-sort="received_at">Received</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="emailTable"><tr><td colspan="8" class="empty">Loading queue...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
  <aside class="detail-panel" id="detailPanel">
    <button type="button" class="btn-secondary" id="closeDetail">Close</button>
    <h2 id="detailSubject"></h2>
    <div class="detail-meta" id="detailMeta"></div>
    <p id="detailSummary"></p>
    <div class="detail-body" id="detailBody"></div>
    <div class="detail-actions">
      <button type="button" class="btn" data-action="assign">Assign to Senior Agent</button>
      <button type="button" class="btn btn-secondary" data-action="progress">Mark In Progress</button>
      <button type="button" class="btn btn-secondary" data-action="resolve">Mark Resolved</button>
    </div>
  </aside>
  <script>
    let apiKey = '';
    let emails = [];
    let sortField = 'distress_score';
    let sortAsc = false;
    let selectedId = null;
    let highlightId = null;

    const $ = (id) => document.getElementById(id);

    async function api(path, options = {}) {
      const headers = { Authorization: 'Bearer ' + apiKey, ...(options.headers || {}) };
      const res = await fetch(path, { ...options, headers });
      if (!res.ok) throw new Error('API ' + res.status);
      if (res.status === 204) return null;
      return res.json();
    }

    function scoreGradient(n) {
      const pct = (n / 10) * 100;
      return 'linear-gradient(90deg, #00d4aa 0%, #ffa502 ' + (pct * 0.6) + '%, #ff4757 100%)';
    }

    function renderScore(n) {
      const w = (n / 10) * 100;
      return '<div class="score-bar"><div class="score-bar-fill" style="width:' + w + '%;background:' + scoreGradient(n) + '"></div></div> <span style="font-family:IBM Plex Mono,monospace;font-size:0.75rem">' + n + '/10</span>';
    }

    function badge(cls, text) {
      return '<span class="badge ' + cls + '">' + text + '</span>';
    }

    function unescapeHtml(s) {
      const d = document.createElement('div');
      d.innerHTML = s;
      return d.textContent;
    }

    function filteredEmails() {
      const status = $('filterStatus').value;
      const priority = $('filterPriority').value;
      const tone = $('filterTone').value;
      return emails.filter((e) => {
        if (status && e.status !== status) return false;
        if (priority && e.priority !== priority) return false;
        if (tone && e.tone_label !== tone) return false;
        return true;
      }).sort((a, b) => {
        let av = a[sortField];
        let bv = b[sortField];
        if (sortField === 'received_at') {
          av = new Date(av).getTime();
          bv = new Date(bv).getTime();
        }
        if (av < bv) return sortAsc ? -1 : 1;
        if (av > bv) return sortAsc ? 1 : -1;
        return 0;
      });
    }

    function renderTable() {
      const rows = filteredEmails();
      if (!rows.length) {
        $('emailTable').innerHTML = '<tr><td colspan="8" class="empty">No emails match filters</td></tr>';
        return;
      }
      $('emailTable').innerHTML = rows.map((e) => {
        const hl = e.id === highlightId ? ' class="highlight"' : '';
        const time = new Date(e.received_at).toLocaleString();
        return '<tr data-id="' + e.id + '"' + hl + '>' +
          '<td>' + renderScore(e.distress_score) + '</td>' +
          '<td>' + badge('prio-' + e.priority, e.priority) + '</td>' +
          '<td>' + unescapeHtml(e.sender) + '</td>' +
          '<td>' + unescapeHtml(e.subject) + '</td>' +
          '<td>' + badge('tone-' + e.tone_label, e.tone_label) + '</td>' +
          '<td>' + e.escalation_risk + '</td>' +
          '<td style="color:var(--muted);font-size:0.75rem">' + time + '</td>' +
          '<td>' + e.status + '</td></tr>';
      }).join('');
      document.querySelectorAll('#emailTable tr[data-id]').forEach((tr) => {
        tr.addEventListener('click', () => openDetail(Number(tr.dataset.id)));
      });
    }

    async function loadDashboard() {
      const stats = await api('/api/dashboard');
      $('topbar').innerHTML = [
        ['Total', stats.total],
        ['Open', stats.open],
        ['Critical', stats.critical],
        ['Avg Distress', stats.avg_distress_score],
      ].map(([label, num]) => '<div class="stat-card"><div class="num">' + num + '</div><div class="label">' + label + '</div></div>').join('');
      $('miniStats').innerHTML = Object.entries(stats.tone_breakdown || {}).slice(0, 4).map(([k, v]) =>
        '<div class="mini-stat"><div class="val">' + v + '</div><div class="lbl">' + k + '</div></div>'
      ).join('');
    }

    async function loadEmails() {
      emails = await api('/api/emails?sort=distress_score&order=desc');
      renderTable();
    }

    async function openDetail(id) {
      selectedId = id;
      const e = emails.find((x) => x.id === id) || await api('/api/emails/' + id);
      $('detailSubject').textContent = unescapeHtml(e.subject);
      $('detailMeta').textContent = unescapeHtml(e.sender) + ' · ' + e.priority + ' · Score ' + e.distress_score + '/10 · Risk: ' + e.escalation_risk;
      $('detailSummary').textContent = e.summary || '';
      $('detailBody').textContent = unescapeHtml(e.body);
      $('detailPanel').classList.add('open');
      $('overlay').classList.add('show');
    }

    function closeDetail() {
      $('detailPanel').classList.remove('open');
      $('overlay').classList.remove('show');
      selectedId = null;
    }

    async function patchEmail(fields) {
      if (!selectedId) return;
      await api('/api/emails/' + selectedId, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(fields),
      });
      await loadEmails();
      openDetail(selectedId);
    }

    $('submitToggle').addEventListener('click', () => $('submitForm').classList.toggle('open'));
    $('closeDetail').addEventListener('click', closeDetail);
    $('overlay').addEventListener('click', closeDetail);

    $('submitForm').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const btn = $('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Analyzing...';
      try {
        const created = await api('/api/emails', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            sender: $('sender').value,
            subject: $('subject').value,
            body: $('body').value,
          }),
        });
        highlightId = created.id;
        $('submitForm').reset();
        await loadEmails();
        await loadDashboard();
        setTimeout(() => { highlightId = null; }, 2000);
      } catch (err) {
        alert('Failed to analyze email');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Analyze with AI';
      }
    });

    document.querySelectorAll('[data-action]').forEach((btn) => {
      btn.addEventListener('click', () => {
        if (btn.dataset.action === 'assign') patchEmail({ assigned_to: 'Senior Agent', status: 'In Progress' });
        if (btn.dataset.action === 'progress') patchEmail({ status: 'In Progress' });
        if (btn.dataset.action === 'resolve') patchEmail({ status: 'Resolved' });
      });
    });

    ['filterStatus', 'filterPriority', 'filterTone'].forEach((id) => {
      $(id).addEventListener('change', renderTable);
    });

    document.querySelectorAll('th[data-sort]').forEach((th) => {
      th.addEventListener('click', () => {
        const f = th.dataset.sort;
        if (sortField === f) sortAsc = !sortAsc;
        else { sortField = f; sortAsc = false; }
        renderTable();
      });
    });

    async function init() {
      const cfg = await fetch('/api/config').then((r) => r.json());
      apiKey = cfg.apiKey;
      await loadDashboard();
      await loadEmails();
      setInterval(loadEmails, 30000);
    }

    init().catch(() => {
      $('emailTable').innerHTML = '<tr><td colspan="8" class="empty">Failed to connect to API</td></tr>';
    });
  </script>
</body>
</html>
